<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ምዝገባ እና መግቢያ - ጥቁር ዳራ ላይ ፎቶ</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 36px;
            padding: 30px 25px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .mode-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .mode-btn {
            flex: 1;
            background: #e0e0e0;
            color: #333;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: #1a3e60;
            color: white;
        }
        .step { display: none; animation: fadeIn 0.4s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(15px);} to { opacity:1; transform:translateY(0);} }
        input, button {
            width: 100%; padding: 14px 18px; margin: 10px 0;
            border: 1px solid #ddd; border-radius: 60px; font-size: 16px;
        }
        button {
            background: #1a3e60; color: white; border: none; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #0e2a42; transform: scale(0.98); }
        .photo-actions { display: flex; gap: 12px; margin: 10px 0; }
        .photo-actions button { flex:1; background: #2c3e50; }
        .photo-preview { text-align: center; margin: 15px 0; min-height: 160px; background: #f5f5f5; border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .photo-preview img { max-width:100%; max-height:220px; border-radius:28px; border:2px solid #ccc; }
        .message {
            position: fixed; bottom: 20px; left: 20px; right: 20px; z-index: 100;
            text-align: center; font-weight: bold; padding: 10px; border-radius: 50px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info-text { font-size: 13px; color: #6c757d; text-align: center; margin-top: 10px; }
        .switch-text {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .switch-text span {
            color: #1a3e60;
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
        }
        .third-page-full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow-y: auto;
        }
        .blocked-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a0000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .blocked-content {
            background: #8b0000;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            color: white;
        }
        .photo-frame {
            background: rgba(30,30,30,0.9);
            padding: 20px;
            border-radius: 40px;
            margin: 20px;
            max-width: 90%;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }
        .photo-frame img {
            max-width: 100%;
            max-height: 55vh;
            border-radius: 24px;
            display: block;
            margin: 0 auto;
            border: 3px solid #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .third-content {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            padding: 25px 20px;
            border-radius: 60px;
            text-align: center;
            max-width: 90%;
            margin: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .third-content h2 { 
            color: #ffeb3b; 
            font-size: 1.8rem; 
            margin-bottom: 15px; 
            text-shadow: 2px 2px 4px black;
        }
        .third-content p { 
            color: white; 
            font-size: 1.2rem; 
            margin: 15px 0; 
            line-height: 1.4;
        }
        .telegram-link {
            display: inline-flex; align-items: center; gap: 12px;
            background: #0088cc; padding: 12px 28px; border-radius: 50px;
            text-decoration: none; color: white; font-weight: bold; font-size: 1.1rem;
            margin-top: 15px; transition: 0.2s; border: 2px solid white;
        }
        .telegram-link:hover { background: #006699; transform: scale(1.02); }
        .telegram-link img { width: 28px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2)); }
    </style>
</head>
<body>

<div id="mainCard" class="card">
    <div class="mode-buttons">
        <button id="registerModeBtn" class="mode-btn active">📝 register</button>
        <button id="loginModeBtn" class="mode-btn">🔐 log in</button>
    </div>

    <div id="registerSection">
        <div id="step1" class="step active">
            <h1>📋 መረጃ በትክክል ይሙሉ</h1>  
            <input type="tel" id="regPhone" placeholder="📞 09XXXXXXXX" autocomplete="off">
            <input type="text" id="regFullname" placeholder="👤 first name">
            <input type="text" id="regFathername" placeholder="👨 last name">
            <input type="password" id="regPassword" placeholder="🔒 ፓስወርድ (ቁጥር ብቻ)">
            <button id="submitRegisterStep1">✅ ቀጥል</button>
            <div class="info-text"></div>
        </div>

        <div id="step2" class="step">
            <h1>📸 ፎቶ ይምረጡ</h1> 
            <div class="photo-preview" id="photoPreviewArea">📸 ካሜራ ወይም ጋላሪ ይጫኑ</div>
            <div class="photo-actions">
                <button id="cameraFrontBtn">📸 ካሜራ</button>
                <button id="galleryBtn">🖼️ ከጋላሪ</button>
            </div>
            <button id="acceptPhotoBtn" style="background:#27ae60;">✅ ፎቶ ተቀበል</button>
            <button id="rejectPhotoBtn" style="background:#c0392b;">❌ ፎቶ ውድቅ አድርግ</button>
            <div class="info-text">ፎቶ ከመረጡ በኋላ "ፎቶ ተቀበል" ይጫኑ።</div>
        </div>
    </div>

    <div id="loginSection" style="display: none;">
        <h2>🔐 ወደ መግቢያ ገጽ እንኳን ደህና መጡ</h2>
        <input type="tel" id="loginPhone" placeholder="📞 09XXXXXXXX">
        <input type="password" id="loginPassword" placeholder="🔒 ፓስወርድ">
        <button id="doLoginBtn">🚀 ግባ</button>
        <div class="switch-text">አካውንት የለዎትም? <span id="switchToRegister">አሁን ይመዝገቡ</span></div>
    </div>
</div>
<div id="globalMessage" class="message"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAgIAS0hWRkZlg38kKH7O6V0JXg__j2zE8",
        authDomain: "my-user-system-13ec2.firebaseapp.com",
        projectId: "my-user-system-13ec2",
        storageBucket: "my-user-system-13ec2.firebasestorage.app",
        messagingSenderId: "388651452442",
        appId: "1:388651452442:web:9eb39716c680a8e66ca9a3",
        measurementId: "G-N05W17L3HN"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const ADMIN_BG_KEY = 'admin_global_background';
    const STORAGE_KEY = 'all_user_registrations';

    function getAdminBackground() { return localStorage.getItem(ADMIN_BG_KEY); }
    function showMessage(msg, isSuccess=true) {
        const msgDiv = document.getElementById('globalMessage');
        msgDiv.textContent = msg;
        msgDiv.className = 'message ' + (isSuccess ? 'success' : 'error');
        setTimeout(() => msgDiv.className = 'message', 4000);
    }
    function validatePhone(p) { return /^09\d{8}$/.test(p); }
    function validatePassword(p) { return /^\d+$/.test(p); }
    function validateName(n) { return n.trim().length >= 2; }

    // ሊንኩ ተግዶ መሆኑን ማረጋገጫ
    async function isAppBlocked() {
        const blockDoc = await db.collection("system").doc("globalBlock").get();
        return blockDoc.exists && blockDoc.data().blocked === true;
    }

    // ስልክ ተመዝግቧል? (ለመመዝገብ)
    async function isPhoneRegistered(phone) {
        const snapshot = await db.collection("users").where("phone", "==", phone).limit(1).get();
        return !snapshot.empty;
    }

    // ስም ተመዝግቧል? (ለመመዝገብ)
    async function isFullNameRegistered(fullName) {
        const snapshot = await db.collection("users").where("fullName", "==", fullName).limit(1).get();
        return !snapshot.empty;
    }

    // የመጀመሪያ ደረጃ መረጃ ማስቀመጫ (pending)
    let pendingDocId = null;
    async function saveInitialUserData(userObj) {
        try {
            const docRef = await db.collection("users").add({
                phone: userObj.phone,
                fullName: userObj.fullName,
                fatherName: userObj.fatherName,
                password: userObj.password,
                photoData: null,
                photoStatus: 'pending',
                step: 'step1_complete',
                blocked: false,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            return docRef.id;
        } catch (error) {
            console.error("Firestore initial save error:", error);
            return null;
        }
    }

    // ፎቶ ሲጨመር መረጃ ማዘመን
    async function updateUserWithPhoto(docId, photoData) {
        try {
            await db.collection("users").doc(docId).update({
                photoData: photoData,
                photoStatus: 'accepted',
                step: 'complete_with_photo'
            });
            return true;
        } catch (error) {
            console.error("Firestore update error:", error);
            return false;
        }
    }

    // ለመግቢያ: ተጠቃሚ ፈልግ (እንዲሁም ታግዶ እንደሆነ ለይቶ ለማወቅ)
    async function findUserForLogin(phone, password) {
        try {
            const snapshot = await db.collection("users")
                .where("phone", "==", phone)
                .where("password", "==", password)
                .limit(1)
                .get();
            if (snapshot.empty) return { exists: false };
            const userData = snapshot.docs[0].data();
            return { 
                exists: true, 
                blocked: userData.blocked === true,
                photoStatus: userData.photoStatus,
                fullName: userData.fullName,
                photoData: userData.photoData
            };
        } catch (error) {
            console.error(error);
            return { exists: false, error: true };
        }
    }

    // ሁነታ መቀየሪያ
    const registerModeBtn = document.getElementById('registerModeBtn');
    const loginModeBtn = document.getElementById('loginModeBtn');
    const registerSection = document.getElementById('registerSection');
    const loginSection = document.getElementById('loginSection');
    const switchToRegister = document.getElementById('switchToRegister');

    function setMode(mode) {
        if (mode === 'register') {
            registerSection.style.display = 'block';
            loginSection.style.display = 'none';
            registerModeBtn.classList.add('active');
            loginModeBtn.classList.remove('active');
        } else {
            registerSection.style.display = 'none';
            loginSection.style.display = 'block';
            registerModeBtn.classList.remove('active');
            loginModeBtn.classList.add('active');
        }
    }
    registerModeBtn.onclick = () => setMode('register');
    loginModeBtn.onclick = () => setMode('login');
    if(switchToRegister) switchToRegister.onclick = () => setMode('register');

    let tempRegData = { phone:'', fullName:'', fatherName:'', password:'', photoData:null };
    let currentPhotoData = null;

    // ደረጃ 1: መረጃ አስገብቶ ወደ Firebase ላክ
    document.getElementById('submitRegisterStep1').onclick = async () => {
        const phone = document.getElementById('regPhone').value.trim();
        const fullName = document.getElementById('regFullname').value.trim();
        const fatherName = document.getElementById('regFathername').value.trim();
        const password = document.getElementById('regPassword').value;

        if(!validatePhone(phone)) return showMessage("ስልክ 09XXXXXXXX መሆን አለበት", false);
        if(!validateName(fullName)) return showMessage("ስም ያስገቡ", false);
        if(!validateName(fatherName)) return showMessage("የአባት ስም ያስገቡ", false);
        if(!validatePassword(password)) return showMessage("ፓስወርድ ቁጥር ብቻ ይሁን", false);

        // ስልክ ወይም ስም ቀድሞ መዝግቧል?
        const phoneExists = await isPhoneRegistered(phone);
        if(phoneExists) return showMessage("ይህ ስልክ ቀድሞ ተመዝግቧል! በመግቢያ ገጽ ይሞክሩ", false);
        
        const nameExists = await isFullNameRegistered(fullName);
        if(nameExists) return showMessage("ይህ ስም ቀድሞ ተመዝግቧል! ሌላ ስም ይጠቀሙ", false);

        tempRegData = { phone, fullName, fatherName, password, photoData: null };
        
        // ወዲያውኑ ወደ Firestore ላክ (pending ሆኖ)
        showMessage("መረጃዎ በማስቀመጥ ላይ...", true);
        const docId = await saveInitialUserData(tempRegData);
        if(docId) {
            pendingDocId = docId;
            showMessage(`🎉 እንኳን ደስ ያለዎት ${fullName}! አሁን ፎቶ ይምረጡ`, true);
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            currentPhotoData = null;
            document.getElementById('photoPreviewArea').innerHTML = '📸 ካሜራ ወይም ጋላሪ ይጫኑ';
        } else {
            showMessage("ይቅርታ፣ መረጃዎን ማስቀመጥ አልተቻለም። ዳግም ሞክሩ", false);
        }
    };

    function handleSelectedFile(file) {
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            currentPhotoData = e.target.result;
            const previewDiv = document.getElementById('photoPreviewArea');
            previewDiv.innerHTML = `<img src="${currentPhotoData}" alt="preview">`;
            showMessage("ፎቶ ተመርጧል! አሁን 'ፎቶ ተቀበል' ይጫኑ", true);
        };
        reader.readAsDataURL(file);
    }

    document.getElementById('cameraFrontBtn').onclick = () => {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.capture = 'user';
        input.onchange = (e) => handleSelectedFile(e.target.files[0]);
        input.click();
    };
    document.getElementById('galleryBtn').onclick = () => {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => handleSelectedFile(e.target.files[0]);
        input.click();
    };

    // ፎቶ ተቀበል - ነባሩን ሰነድ አዘምን
    document.getElementById('acceptPhotoBtn').onclick = async () => {
        if(!currentPhotoData) {
            showMessage("እባክዎ መጀመሪያ ፎቶ ያንሱ ወይም ከጋላሪ ይምረጡ", false);
            return;
        }
        if(!pendingDocId) {
            showMessage("የምዝገባ ሂደት አልተጀመረም። እባክዎ ዳግም ይሞክሩ", false);
            return;
        }
        showMessage("ፎቶ በማስቀመጥ ላይ...", true);
        const success = await updateUserWithPhoto(pendingDocId, currentPhotoData);
        if(success) {
            showMessage("✅ ምዝገባ ተጠናቋል!", true);
            const mainCard = document.getElementById('mainCard');
            mainCard.style.display = 'none';
            const adminBg = getAdminBackground();
            const displayPhoto = adminBg ? adminBg : currentPhotoData;
            const thirdDiv = document.createElement('div');
            thirdDiv.className = 'third-page-full';
            thirdDiv.innerHTML = `
                <div class="photo-frame">
                    <img src="${displayPhoto}" alt="Display Photo">
                </div>
                <div class="third-content">
                    <h2>🎉 እንኳን ደስ ያለዎት! 🎉</h2>
                    <p>✨ ምዝገባዎ ተሳክቷል ✨<br>አሁን ቴሌግራማችንን በመቀላቀል ጥያቄዎችን በመስራት ለፈተና ይዘጋጁ!</p>
                    <a href="https://t.me/+HIDAQtssqFI4MDFk" target="_blank" class="telegram-link">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="T.G" width="28">
                        📢 ቴሌግራም ቻናላችንን ይቀላቀሉ
                    </a>
                </div>
            `;
            document.body.appendChild(thirdDiv);
        } else {
            showMessage("ይቅርታ፣ ፎቶውን ማስቀመጥ አልተቻለም። ዳግም ሞክሩ", false);
        }
    };

    document.getElementById('rejectPhotoBtn').onclick = () => {
        showMessage("ፎቶ ውድቅ ተደርጓል። ገጹ እንደገና ይጫናል", false);
        setTimeout(() => location.reload(), 1500);
    };

    // የመግቢያ ተግባር - ግልጽ መልእክት ይሰጣል
    document.getElementById('doLoginBtn').onclick = async () => {
        const phone = document.getElementById('loginPhone').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        const result = await findUserForLogin(phone, pwd);
        
        if(!result.exists) {
            showMessage("ስልክ ወይም ፓስወርድ ተሳስቷል። እባክዎ ዳግም ይሞክሩ", false);
            return;
        }
        if(result.blocked) {
            showMessage("መለያዎ በአስተዳዳሪ ታግዷል። እባክዎ ያግኙን", false);
            return;
        }
        if(result.photoStatus !== 'accepted') {
            showMessage("ምዝገባዎ አልተጠናቀቀም። እባክዎ ፎቶ ይምረጡ", false);
            return;
        }
        // ስኬት
        showMessage(`✅ እንኳን ደህና መጡ ${result.fullName}!`, true);
        const mainCard = document.getElementById('mainCard');
        mainCard.style.display = 'none';
        const adminBg = getAdminBackground();
        const displayPhoto = adminBg ? adminBg : result.photoData;
        const thirdDiv = document.createElement('div');
        thirdDiv.className = 'third-page-full';
        thirdDiv.innerHTML = `
            <div class="photo-frame">
                <img src="${displayPhoto}" alt="Display Photo">
            </div>
            <div class="third-content">
                <h2>👋 ደህና መጡ!</h2>
                <a href="https://t.me/+HIDAQtssqFI4MDFk" target="_blank" class="telegram-link">📢 ቴሌግራም ቻናል</a>
            </div>
        `;
        document.body.appendChild(thirdDiv);
    };

    // አጠቃላይ ሊንክ መገደድ ካለ ማሳያ
    async function checkGlobalBlock() {
        const blocked = await isAppBlocked();
        if(blocked) {
            document.body.innerHTML = `
                <div class="blocked-page">
                    <div class="blocked-content">
                        <h1>⛔ አገልግሎቱ ለጊዜው ተቋርጧል</h1>
                        <p>እባክዎ ቆይተው ይሞክሩ ወይም አስተዳዳሪውን ያግኙ።</p>
                    </div>
                </div>
            `;
        }
    }
    checkGlobalBlock();

    setMode('register');
    if(!localStorage.getItem(STORAGE_KEY)) localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
</script>
</body>
</html>
