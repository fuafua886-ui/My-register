<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ምዝገባ - ፎቶ ተቀበል ችግር ተፈቷል</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 36px;
            padding: 30px 25px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }
        .mode-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .mode-btn {
            flex: 1;
            background: #e0e0e0;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }
        .mode-btn.active {
            background: #1a3e60;
            color: white;
        }
        .step { display: none; }
        .step.active { display: block; }
        input, button {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 60px;
            font-size: 16px;
        }
        button {
            background: #1a3e60;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .photo-actions {
            display: flex;
            gap: 12px;
            margin: 10px 0;
        }
        .photo-actions button {
            flex: 1;
            background: #2c3e50;
        }
        .photo-preview {
            text-align: center;
            margin: 15px 0;
            min-height: 160px;
            background: #f5f5f5;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-preview img {
            max-width: 100%;
            max-height: 220px;
            border-radius: 20px;
            border: 2px solid #ccc;
        }
        .message {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            text-align: center;
            font-weight: bold;
            padding: 12px;
            border-radius: 50px;
            z-index: 100;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .third-page-full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .photo-frame {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 40px;
            margin: 20px;
        }
        .photo-frame img {
            max-width: 90vw;
            max-height: 50vh;
            border-radius: 24px;
            border: 3px solid white;
        }
        .third-content {
            background: rgba(0,0,0,0.85);
            padding: 25px;
            border-radius: 60px;
            text-align: center;
            color: white;
        }
        .telegram-link {
            display: inline-block;
            background: #0088cc;
            padding: 12px 28px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            margin-top: 15px;
        }
        .info-text {
            text-align: center;
            font-size: 13px;
            color: #6c757d;
            margin-top: 10px;
        }
        .switch-text {
            text-align: center;
            margin-top: 15px;
        }
        .switch-text span {
            color: #1a3e60;
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div id="mainCard" class="card">
    <div class="mode-buttons">
        <button id="registerModeBtn" class="mode-btn active">📝 ምዝገባ</button>
        <button id="loginModeBtn" class="mode-btn">🔐 መግቢያ</button>
    </div>

    <div id="registerSection">
        <div id="step1" class="step active">
            <h2>📋 ደረጃ 1: መረጃ ይሙሉ</h2>
            <input type="tel" id="regPhone" placeholder="📞 09XXXXXXXX">
            <input type="text" id="regFullname" placeholder="👤 first name">
            <input type="text" id="regFathername" placeholder="👨 last name">
            <input type="password" id="regPassword" placeholder="🔒 password (ቁጥር ብቻ)">
            <button id="submitRegisterStep1">✅ ቀጥል</button>
        </div>

        <div id="step2" class="step">
            <h2>📸 ደረጃ 2: ፎቶዎን ያስገቡ</h2>
            <div class="photo-preview" id="photoPreviewArea">📸 ካሜራ ወይም ጋላሪ ይጫኑ</div>
            <div class="photo-actions">
                <button id="cameraFrontBtn">🤳 የፊት ካሜራ</button>
                <button id="galleryBtn">🖼️ ከጋላሪ ምረጥ</button>
            </div>
            <button id="acceptPhotoBtn" style="background:#27ae60;">✅ ፎቶውን ተቀበልኩ</button>
            <button id="rejectPhotoBtn" style="background:#c0392b;">❌ ፎቶውን ውድቅ አደረኩ</button>
            <div class="info-text">ፎቶ ከመረጡ በኋላ "ተቀበልኩ" ይጫኑ።</div>
        </div>
    </div>

    <div id="loginSection" style="display: none;">
        <h2>🔐 መግቢያ</h2>
        <input type="tel" id="loginPhone" placeholder="📞 09XXXXXXXX">
        <input type="password" id="loginPassword" placeholder="🔒 ፓስወርድ">
        <button id="doLoginBtn">🚀 ግባ</button>
        <div class="switch-text">አካውንት የለዎትም? <span id="switchToRegister">አሁን ይመዝገቡ</span></div>
    </div>
</div>
<div id="globalMessage" class="message"></div>

<script>
    const STORAGE_KEY = 'user_data_clean';
    let tempRegData = { phone:'', fullName:'', fatherName:'', password:'', photoData:null };
    let currentPhotoData = null;   // የተመረጠው ፎቶ base64

    // መልዕክት ለማሳየት
    function showMessage(msg, isSuccess=true) {
        const msgDiv = document.getElementById('globalMessage');
        msgDiv.textContent = msg;
        msgDiv.className = 'message ' + (isSuccess ? 'success' : 'error');
        setTimeout(() => msgDiv.className = 'message', 4000);
    }

    // ማረጋገጫዎች
    function validatePhone(p) { return /^09\d{8}$/.test(p); }
    function validatePassword(p) { return /^\d+$/.test(p); }
    function validateName(n) { return n.trim().length >= 2; }

    // ማህደር ማስቀመጫ
    function saveUser(userObj) {
        let all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        all.push({ ...userObj, timestamp: new Date().toISOString() });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
    }

    // ሁነታ መቀየሪያ (register / login)
    const registerModeBtn = document.getElementById('registerModeBtn');
    const loginModeBtn = document.getElementById('loginModeBtn');
    const registerSection = document.getElementById('registerSection');
    const loginSection = document.getElementById('loginSection');
    const switchToRegister = document.getElementById('switchToRegister');

    function setMode(mode) {
        if (mode === 'register') {
            registerSection.style.display = 'block';
            loginSection.style.display = 'none';
            registerModeBtn.classList.add('active');
            loginModeBtn.classList.remove('active');
        } else {
            registerSection.style.display = 'none';
            loginSection.style.display = 'block';
            registerModeBtn.classList.remove('active');
            loginModeBtn.classList.add('active');
        }
    }
    registerModeBtn.onclick = () => setMode('register');
    loginModeBtn.onclick = () => setMode('login');
    if(switchToRegister) switchToRegister.onclick = () => setMode('register');

    // ደረጃ 1 ማስገቢያ
    document.getElementById('submitRegisterStep1').onclick = () => {
        const phone = document.getElementById('regPhone').value.trim();
        const fullName = document.getElementById('regFullname').value.trim();
        const fatherName = document.getElementById('regFathername').value.trim();
        const password = document.getElementById('regPassword').value;

        if(!validatePhone(phone)) return showMessage("ስልክ 09XXXXXXXX መሆን አለበት", false);
        if(!validateName(fullName)) return showMessage("ስም ያስገቡ", false);
        if(!validateName(fatherName)) return showMessage("የአባት ስም ያስገቡ", false);
        if(!validatePassword(password)) return showMessage("ፓስወርድ ቁጥር ብቻ ይሁን", false);

        tempRegData = { phone, fullName, fatherName, password, photoData: null };
        showMessage(`✨ እንኳን ደስ ያለዎት ${fullName}! አሁን ፎቶ ይምረጡ`, true);
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        currentPhotoData = null;
        document.getElementById('photoPreviewArea').innerHTML = '📸 ካሜራ ወይም ጋላሪ ይጫኑ';
    };

    // ፎቶ ከካሜራ ወይም ጋላሪ የማምጣት ተግባር
    function handleSelectedFile(file) {
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            currentPhotoData = e.target.result;
            const previewDiv = document.getElementById('photoPreviewArea');
            previewDiv.innerHTML = `<img src="${currentPhotoData}" alt="preview">`;
            showMessage("ፎቶ ተመርጧል! አሁን 'ፎቶውን ተቀበልኩ' ይጫኑ", true);
            console.log("Photo loaded, length:", currentPhotoData.length);
        };
        reader.readAsDataURL(file);
    }

    document.getElementById('cameraFrontBtn').onclick = () => {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.capture = 'user';
        input.onchange = (e) => handleSelectedFile(e.target.files[0]);
        input.click();
    };
    document.getElementById('galleryBtn').onclick = () => {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => handleSelectedFile(e.target.files[0]);
        input.click();
    };

    // ✅ ACCEPT BUTTON – ችግሩ ተፈቷል
    document.getElementById('acceptPhotoBtn').onclick = () => {
        console.log("Accept clicked, currentPhotoData =", currentPhotoData ? "has value" : "null");
        if(!currentPhotoData) {
            showMessage("እባክዎ መጀመሪያ ፎቶ ያንሱ ወይም ከጋላሪ ይምረጡ", false);
            return;
        }
        // ማስቀመጥ
        tempRegData.photoData = currentPhotoData;
        saveUser(tempRegData);
        showMessage("✅ ምዝገባ ተጠናቋል! ወደ ማጠናቀቂያ ገጽ እየወሰድንዎት ነው...", true);
        
        // ጥቁር ዳራ ገጽ ማሳየት
        const mainCard = document.getElementById('mainCard');
        mainCard.style.display = 'none';
        
        const thirdDiv = document.createElement('div');
        thirdDiv.className = 'third-page-full';
        thirdDiv.innerHTML = `
            <div class="photo-frame">
                <img src="${tempRegData.photoData}" alt="User Photo">
            </div>
            <div class="third-content">
                <h2>🎉 እንኳን ደስ ያለዎት! 🎉</h2>
                <p>ምዝገባዎ ተሳክቷል።<br>ቴሌግራማችንን ይቀላቀሉ</p>
                <a href="https://t.me/+HIDAQtssqFI4MDFk" target="_blank" class="telegram-link">📢 ቴሌግራም ቻናል</a>
            </div>
        `;
        document.body.appendChild(thirdDiv);
    };

    // ❌ REJECT BUTTON
    document.getElementById('rejectPhotoBtn').onclick = () => {
        showMessage("ፎቶ ውድቅ ተደርጓል። ገጹ እንደገና ይጫናል", false);
        setTimeout(() => location.reload(), 1500);
    };

    // የመግቢያ ተግባር
    function findUser(phone, password) {
        const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        return all.find(u => u.phone === phone && u.password === password && u.photoData);
    }

    document.getElementById('doLoginBtn').onclick = () => {
        const phone = document.getElementById('loginPhone').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        const user = findUser(phone, pwd);
        if(user) {
            showMessage(`እንኳን ደህና መጡ ${user.fullName}`, true);
            document.getElementById('mainCard').style.display = 'none';
            const thirdDiv = document.createElement('div');
            thirdDiv.className = 'third-page-full';
            thirdDiv.innerHTML = `
                <div class="photo-frame"><img src="${user.photoData}" alt="Photo"></div>
                <div class="third-content">
                    <h2>👋 ደህና መጡ!</h2>
                    <a href="https://t.me/+HIDAQtssqFI4MDFk" target="_blank" class="telegram-link">📢 ቴሌግራም ቻናል</a>
                </div>
            `;
            document.body.appendChild(thirdDiv);
        } else {
            showMessage("ስልክ ወይም ፓስወርድ ተሳስቷል", false);
        }
    };

    // ገጹ ሲጀምር
    setMode('register');
    // ማንኛውም የሙከራ ውሂብ ካለ ማጽዳት (አማራጭ)
    if(!localStorage.getItem(STORAGE_KEY)) localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
</script>
</body>
</html>
