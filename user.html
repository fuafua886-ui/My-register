<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ምዝገባ እና መግቢያ - ጥቁር ዳራ ላይ ፎቶ</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 36px;
            padding: 30px 25px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .mode-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .mode-btn {
            flex: 1;
            background: #e0e0e0;
            color: #333;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: #1a3e60;
            color: white;
        }
        .step { display: none; animation: fadeIn 0.4s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(15px);} to { opacity:1; transform:translateY(0);} }
        input, button {
            width: 100%; padding: 14px 18px; margin: 10px 0;
            border: 1px solid #ddd; border-radius: 60px; font-size: 16px;
        }
        button {
            background: #1a3e60; color: white; border: none; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #0e2a42; transform: scale(0.98); }
        .photo-actions { display: flex; gap: 12px; margin: 10px 0; }
        .photo-actions button { flex:1; background: #2c3e50; }
        .photo-preview { text-align: center; margin: 15px 0; }
        .photo-preview img { max-width:100%; max-height:220px; border-radius:28px; border:2px solid #ccc; }
        .message {
            position: fixed; bottom: 20px; left: 20px; right: 20px; z-index: 100;
            text-align: center; font-weight: bold; padding: 10px; border-radius: 50px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info-text { font-size: 13px; color: #6c757d; text-align: center; margin-top: 10px; }
        .switch-text {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .switch-text span {
            color: #1a3e60;
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
        }
        
        /* ሶስተኛ ገጽ - ጥቁር ዳራ እና መሃል ላይ ፎቶ */
        .third-page-full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow-y: auto;
        }
        .photo-frame {
            background: rgba(30,30,30,0.9);
            padding: 20px;
            border-radius: 40px;
            margin: 20px;
            max-width: 90%;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }
        .photo-frame img {
            max-width: 100%;
            max-height: 55vh;
            border-radius: 24px;
            display: block;
            margin: 0 auto;
            border: 3px solid #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .third-content {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            padding: 25px 20px;
            border-radius: 60px;
            text-align: center;
            max-width: 90%;
            margin: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .third-content h2 { 
            color: #ffeb3b; 
            font-size: 1.8rem; 
            margin-bottom: 15px; 
            text-shadow: 2px 2px 4px black;
        }
        .third-content p { 
            color: white; 
            font-size: 1.2rem; 
            margin: 15px 0; 
            line-height: 1.4;
        }
        .telegram-link {
            display: inline-flex; align-items: center; gap: 12px;
            background: #0088cc; padding: 12px 28px; border-radius: 50px;
            text-decoration: none; color: white; font-weight: bold; font-size: 1.1rem;
            margin-top: 15px; transition: 0.2s; border: 2px solid white;
        }
        .telegram-link:hover { background: #006699; transform: scale(1.02); }
        .telegram-link img { width: 28px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2)); }
        .small-note { color: #ccc; margin-top: 25px; font-size: 0.75rem; }
    </style>
</head>
<body>

<div id="mainCard" class="card">
    <!-- ሁነታ መምረጫ ቁልፎች -->
    <div class="mode-buttons">
        <button id="registerModeBtn" class="mode-btn active">📝 register</button>
        <button id="loginModeBtn" class="mode-btn">🔐 log in</button>
    </div>

    <!-- የምዝገባ ሂደት (ደረጃ 1 እና 2) -->
    <div id="registerSection">
        <div id="step1" class="step active">
            <h2>📋:መረጃ በትክክል ይሙሉ</h2>
            <input type="tel" id="regPhone" placeholder="📞 09XXXXXXXX" autocomplete="off">
            <input type="text" id="regFullname" placeholder="👤 first name">
            <input type="text" id="regFathername" placeholder="👨 last name">
            <input type="password" id="regPassword" placeholder="🔒 password">
            <button id="submitRegisterStep1">✅ OK </button>
            <div class="info-text"></div>
        </div>

        <div id="step2" class="step">
            <h2>📸 :ፎቶ ይምረጡ</h2>
            <div class="photo-preview" id="photoPreviewArea"></div>
            <div class="photo-actions">
                <button id="cameraFrontBtn">camera</button>
                <button id="galleryBtn">🖼️ from galary</button>
            </div>
            <button id="acceptPhotoBtn">✅ accept photo</button>
            <div class="info-text">የፊት ካሜራ ተጠቅመው ፎቶ ያንሱ ወይም ከጋላሪ ይምረጡ።</div>
        </div>
    </div>

    <!-- የመግቢያ ሂደት (Login) -->
    <div id="loginSection" style="display: none;">
        <h2>🔐 ወደ መግቢያ ገጽ እንኳን ደህና መጡ</h2>
        <input type="tel" id="loginPhone" placeholder="📞 09XXXXXXXX">
        <input type="password" id="loginPassword" placeholder="🔒 password">
        <button id="doLoginBtn">🚀 log in</button>
        <div class="switch-text">
            no account? <span id="switchToRegister">successful registered</span>
        </div>
    </div>
</div>
<div id="globalMessage" class="message"></div>

<script>
    const STORAGE_KEY = 'all_user_registrations';
    const ADMIN_BG_KEY = 'admin_global_background';

    let tempRegData = { phone:'', fullName:'', fatherName:'', password:'', step1Completed:false, photoData:null, photoStatus:null };
    let currentPhotoData = null;
    let currentMode = 'register'; // 'register' or 'login'

    // ሁነታ መቀየሪያ
    const registerModeBtn = document.getElementById('registerModeBtn');
    const loginModeBtn = document.getElementById('loginModeBtn');
    const registerSection = document.getElementById('registerSection');
    const loginSection = document.getElementById('loginSection');
    const switchToRegister = document.getElementById('switchToRegister');

    function setMode(mode) {
        currentMode = mode;
        if (mode === 'register') {
            registerSection.style.display = 'block';
            loginSection.style.display = 'none';
            registerModeBtn.classList.add('active');
            loginModeBtn.classList.remove('active');
        } else {
            registerSection.style.display = 'none';
            loginSection.style.display = 'block';
            registerModeBtn.classList.remove('active');
            loginModeBtn.classList.add('active');
        }
    }

    registerModeBtn.addEventListener('click', () => setMode('register'));
    loginModeBtn.addEventListener('click', () => setMode('login'));
    if (switchToRegister) switchToRegister.addEventListener('click', () => setMode('register'));

    // የምዝገባ ተግባራት
    function sendToAdminPanel(recordObj) {
        let existing = [];
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) existing = JSON.parse(raw);
        const newEntry = { ...recordObj, timestamp: new Date().toISOString(), id: Date.now()+'_'+Math.random() };
        existing.unshift(newEntry);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
        window.dispatchEvent(new StorageEvent('storage', { key: STORAGE_KEY, newValue: JSON.stringify(existing) }));
    }

    function showMessage(msg, isSuccess=true) {
        const msgDiv = document.getElementById('globalMessage');
        msgDiv.textContent = msg;
        msgDiv.className = 'message ' + (isSuccess ? 'success' : 'error');
        setTimeout(() => { if(msgDiv) msgDiv.className = 'message'; }, 3500);
    }

    function validatePhone(phone) {
        return /^09\d{8}$/.test(phone);
    }

    function validatePassword(password) {
        return /^\d+$/.test(password);
    }

    function validateName(name) {
        return name.trim().length >= 2 && /[a-zA-Z\u1200-\u137F]/.test(name);
    }

    // ለምዝገባ ግቤቶች
    const regPhone = document.getElementById('regPhone');
    const regFullname = document.getElementById('regFullname');
    const regFathername = document.getElementById('regFathername');
    const regPassword = document.getElementById('regPassword');

    let phoneDebounce;
    regPhone.addEventListener('input', function(e) {
        clearTimeout(phoneDebounce);
        phoneDebounce = setTimeout(() => {
            let phoneVal = e.target.value.trim();
            if(phoneVal.length >= 7 && validatePhone(phoneVal)) {
                sendToAdminPanel({ phone:phoneVal, fullName:'', fatherName:'', password:'', photoStatus:null, photoData:null, step:'phone_only' });
                showMessage(`📞 ስልክ ${phoneVal} ተመዝግቧል (ያልተሟላ)`, true);
            } else if(phoneVal.length >= 7 && !validatePhone(phoneVal)) {
                showMessage("ስልክ ቁጥር በ09 መጀመር እና 10 አሃዝ መሆን አለበት", false);
            }
        }, 500);
    });

    document.getElementById('submitRegisterStep1').addEventListener('click', function() {
        const phone = regPhone.value.trim();
        const fullName = regFullname.value.trim();
        const fatherName = regFathername.value.trim();
        const password = regPassword.value;

        if(!validatePhone(phone)) {
            showMessage("ስልክ ቁጥር በ09 መጀመር እና 10 አሃዝ መሆን አለበት", false);
            return;
        }
        if(!validateName(fullName)) {
            showMessage("እባክዎ ሙሉ ስምዎን ቢያንስ 2 ፊደላት ያስገቡ", false);
            return;
        }
        if(password && !validatePassword(password)) {
            showMessage("ፓስዋርድ ቁጥር ብቻ መሆን አለበት", false);
            return;
        }
        if(fatherName && !validateName(fatherName)) {
            showMessage("የአባት ስም ቢያንስ 2 ፊደላት መሆን አለበት", false);
            return;
        }

        tempRegData = { phone, fullName, fatherName, password, step1Completed:true, photoData: null, photoStatus: null };
        sendToAdminPanel({ phone, fullName, fatherName, password, photoStatus:null, photoData:null, step:'after_step1' });
        showMessage(fullName ? `🎉 CONGRATULATIONS! ${fullName} ተመዝግቧል! አሁን ፎቶ ይላኩ።` : `✅ መረጃ ተቀበልን፣ አሁን ፎቶ ይምረጡ`, true);
        
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        document.getElementById('photoPreviewArea').innerHTML = '<div>📸 ከላይ ካሜራ ወይም ጋላሪ ይጫኑ</div>';
    });

    function showPhotoPreview(dataUrl) {
        document.getElementById('photoPreviewArea').innerHTML = `<img src="${dataUrl}" alt="Preview">`;
    }

    function triggerFrontCamera() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.capture = 'user';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => { currentPhotoData = ev.target.result; showPhotoPreview(currentPhotoData); };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    function triggerGallery() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => { currentPhotoData = ev.target.result; showPhotoPreview(currentPhotoData); };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    document.getElementById('cameraFrontBtn').addEventListener('click', triggerFrontCamera);
    document.getElementById('galleryBtn').addEventListener('click', triggerGallery);

    document.getElementById('acceptPhotoBtn').addEventListener('click', function() {
        if(!currentPhotoData) { showMessage("እባክዎ መጀመሪያ ፎቶ ያንሱ ወይም ይምረጡ", false); return; }
        tempRegData.photoData = currentPhotoData;
        tempRegData.photoStatus = 'accepted';
        sendToAdminPanel({ phone:tempRegData.phone, fullName:tempRegData.fullName, fatherName:tempRegData.fatherName, password:tempRegData.password, photoStatus:'accepted', photoData:currentPhotoData, step:'complete_with_photo' });
        showMessage(`✅ SUCCESSFUL! ፎቶዎ ተቀብሏል። እንኳን ደስ ያለዎት!`, true);
        showThirdPageWithBlackBackground();
    });

    document.getElementById('rejectPhotoBtn').addEventListener('click', function() {
        tempRegData.photoStatus = 'rejected';
        tempRegData.photoData = null;
        sendToAdminPanel({ phone:tempRegData.phone, fullName:tempRegData.fullName, fatherName:tempRegData.fatherName, password:tempRegData.password, photoStatus:'rejected', photoData:null, step:'photo_rejected' });
        showMessage(`❌ REJECTED! ፎቶው ውድቅ ተደርጓል። እንደገና ለመሞከር ገፁን ያድሱ።`, false);
        setTimeout(() => location.reload(), 1800);
    });

    function showThirdPageWithBlackBackground() {
        const mainCard = document.getElementById('mainCard');
        if(mainCard) mainCard.style.display = 'none';
        
        let displayPhoto = null;
        const adminPhoto = localStorage.getItem(ADMIN_BG_KEY);
        if(adminPhoto && adminPhoto.startsWith('data:image')) {
            displayPhoto = adminPhoto;
        } else if(tempRegData.photoData) {
            displayPhoto = tempRegData.photoData;
        }
        
        const thirdDiv = document.createElement('div');
        thirdDiv.className = 'third-page-full';
        
        let photoHtml = '';
        if(displayPhoto) {
            photoHtml = `<div class="photo-frame"><img src="${displayPhoto}" alt="Photo"></div>`;
        } else {
            photoHtml = `<div class="photo-frame" style="background: #222; padding: 20px;"><p style="color:white;">ምንም ፎቶ አልተገኘም</p></div>`;
        }
        
        thirdDiv.innerHTML = `
            ${photoHtml}
            <div class="third-content">
                <h2>🎉 እንኳን ደስ ያለዎት! 🎉</h2>
                <p>✨ ምዝገባዎ ተሳክቷል ✨<br>
                አሁን ቴሌግራማችንን በመቀላቀል<br>
                ጥያቄዎችን በመስራት ለፈተና ይዘጋጁ!</p>
                <a href="https://t.me/+HIDAQtssqFI4MDFk" target="_blank" class="telegram-link">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="T.G" width="28" height="28">
                    📢 ቴሌግራም ቻናላችንን ይቀላቀሉ
                </a>
       
                    
                    
                
 
        `;
        document.body.appendChild(thirdDiv);
    }

    // ----- የመግቢያ (Login) ተግባር -----
    function findUserByPhoneAndPassword(phone, password) {
        const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        return records.find(rec => rec.phone === phone && rec.password === password && rec.step === 'complete_with_photo');
    }

    document.getElementById('doLoginBtn').addEventListener('click', function() {
        const phone = document.getElementById('loginPhone').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if(!validatePhone(phone)) {
            showMessage("እባክዎ ትክክለኛ ስልክ ቁጥር ያስገቡ (09XXXXXXXX)", false);
            return;
        }
        if(!password) {
            showMessage("እባክዎ ፓስዋርድዎን ያስገቡ", false);
            return;
        }
        
        const user = findUserByPhoneAndPassword(phone, password);
        if(user) {
            showMessage(`✅ እንኳን ደህና መጡ ${user.fullName || user.phone}! ወደ መግቢያ ገጽ እየዘዋወሩ ነው...`, true);
            // ለዚህ ተጠቃሚ ሶስተኛ ገጽ ማሳየት እንችላለን (ወይም ወደ ሌላ ገጽ)
            // ጊዜያዊ መረጃውን ለማሳየት
            tempRegData = {
                phone: user.phone,
                fullName: user.fullName,
                fatherName: user.fatherName,
                password: user.password,
                step1Completed: true,
                photoData: user.photoData,
                photoStatus: user.photoStatus
            };
            showThirdPageWithBlackBackground();
        } else {
            showMessage("❌ የስልክ ቁጥር ወይም ፓስዋርድ ትክክል አይደለም። እባክዎ ይመዝገቡ ወይም እንደገና ይሞክሩ።", false);
        }
    });

    // መጀመሪያ ማከማቻ
    if(!localStorage.getItem(STORAGE_KEY)) localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
    setMode('register');
</script>
</body>
</html>
