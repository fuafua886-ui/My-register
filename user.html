<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ምዝገባ - ጥቁር ዳራ ላይ ፎቶ</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 36px;
            padding: 30px 25px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }
        .mode-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .mode-btn {
            flex: 1;
            background: #e0e0e0;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }
        .mode-btn.active {
            background: #1a3e60;
            color: white;
        }
        .step { display: none; animation: fadeIn 0.4s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(15px);} to { opacity:1; transform:translateY(0);} }
        input, button {
            width: 100%; padding: 14px 18px; margin: 10px 0;
            border: 1px solid #ddd; border-radius: 60px; font-size: 16px;
        }
        button {
            background: #1a3e60; color: white; border: none; font-weight: bold;
            cursor: pointer;
        }
        button:active { transform: scale(0.98); }
        .photo-actions { display: flex; gap: 12px; margin: 10px 0; }
        .photo-actions button { flex:1; background: #2c3e50; }
        .photo-preview { text-align: center; margin: 15px 0; min-height: 150px; background: #f5f5f5; border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .photo-preview img { max-width:100%; max-height:200px; border-radius: 20px; }
        .message {
            position: fixed; bottom: 20px; left: 20px; right: 20px; z-index: 100;
            text-align: center; font-weight: bold; padding: 12px; border-radius: 50px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .third-page-full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .photo-frame {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 40px;
            margin: 20px;
        }
        .photo-frame img {
            max-width: 90vw;
            max-height: 50vh;
            border-radius: 24px;
            border: 3px solid white;
        }
        .third-content {
            background: rgba(0,0,0,0.85);
            padding: 25px;
            border-radius: 60px;
            text-align: center;
            color: white;
        }
        .telegram-link {
            display: inline-block;
            background: #0088cc;
            padding: 12px 28px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div id="mainCard" class="card">
    <div class="mode-buttons">
        <button id="registerModeBtn" class="mode-btn active">📝 register</button>
        <button id="loginModeBtn" class="mode-btn">🔐 log in</button>
    </div>

    <div id="registerSection">
        <div id="step1" class="step active">
            <h3>📋 መረጃ ይሙሉ</h3>  
            <input type="tel" id="regPhone" placeholder="📞 09XXXXXXXX">
            <input type="text" id="regFullname" placeholder="👤 ስም">
            <input type="text" id="regFathername" placeholder="👨 የአባት ስም">
            <input type="password" id="regPassword" placeholder="🔒 ፓስወርድ (ቁጥር ብቻ)">
            <button id="submitRegisterStep1">✅ ቀጥል</button>
        </div>

        <div id="step2" class="step">
            <h3>📸 ፎቶ ይምረጡ</h3> 
            <div class="photo-preview" id="photoPreviewArea">📸 ካሜራ ወይም ጋላሪ ይጫኑ</div>
            <div class="photo-actions">
                <button id="cameraFrontBtn">📸 ካሜራ (ፊት)</button>
                <button id="galleryBtn">🖼️ ከጋላሪ</button>
            </div>
            <button id="acceptPhotoBtn">✅ ፎቶ ተቀበል</button>
            <div class="info-text">ፎቶ ከመረጡ በኋላ ይህን ቁልፍ ይጫኑ።</div>
        </div>
    </div>

    <div id="loginSection" style="display: none;">
        <h3>🔐 መግቢያ</h3>
        <input type="tel" id="loginPhone" placeholder="📞 09XXXXXXXX">
        <input type="password" id="loginPassword" placeholder="🔒 ፓስወርድ">
        <button id="doLoginBtn">🚀 ግባ</button>
        <div class="switch-text">አካውንት የለዎትም? <span id="switchToRegister">አሁን ይመዝገቡ</span></div>
    </div>
</div>
<div id="globalMessage" class="message"></div>

<script>
    const STORAGE_KEY = 'user_data_fixed';
    let tempRegData = { phone:'', fullName:'', fatherName:'', password:'', photoData:null };
    let currentPhotoData = null;

    // Helper functions
    function showMessage(msg, isSuccess=true) {
        const msgDiv = document.getElementById('globalMessage');
        msgDiv.textContent = msg;
        msgDiv.className = 'message ' + (isSuccess ? 'success' : 'error');
        setTimeout(() => msgDiv.className = 'message', 4000);
    }

    function validatePhone(p) { return /^09\d{8}$/.test(p); }
    function validatePassword(p) { return /^\d+$/.test(p); }
    function validateName(n) { return n.trim().length >= 2; }

    // Save to localStorage
    function saveUser(userObj) {
        let all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        all.push({ ...userObj, timestamp: new Date().toISOString() });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
    }

    // Mode switching
    const registerModeBtn = document.getElementById('registerModeBtn');
    const loginModeBtn = document.getElementById('loginModeBtn');
    const registerSection = document.getElementById('registerSection');
    const loginSection = document.getElementById('loginSection');
    const switchToRegister = document.getElementById('switchToRegister');

    function setMode(mode) {
        if (mode === 'register') {
            registerSection.style.display = 'block';
            loginSection.style.display = 'none';
            registerModeBtn.classList.add('active');
            loginModeBtn.classList.remove('active');
        } else {
            registerSection.style.display = 'none';
            loginSection.style.display = 'block';
            registerModeBtn.classList.remove('active');
            loginModeBtn.classList.add('active');
        }
    }
    registerModeBtn.onclick = () => setMode('register');
    loginModeBtn.onclick = () => setMode('login');
    if(switchToRegister) switchToRegister.onclick = () => setMode('register');

    // Step 1 submit
    document.getElementById('submitRegisterStep1').onclick = () => {
        const phone = document.getElementById('regPhone').value.trim();
        const fullName = document.getElementById('regFullname').value.trim();
        const fatherName = document.getElementById('regFathername').value.trim();
        const password = document.getElementById('regPassword').value;

        if(!validatePhone(phone)) return showMessage("ስልክ 09XXXXXXXX መሆን አለበት", false);
        if(!validateName(fullName)) return showMessage("ስም ያስገቡ", false);
        if(!validateName(fatherName)) return showMessage("የአባት ስም ያስገቡ", false);
        if(!validatePassword(password)) return showMessage("ፓስወርድ ቁጥር ብቻ ይሁን", false);

        tempRegData = { phone, fullName, fatherName, password, photoData: null };
        showMessage(`እንኳን ደስ ያለዎት ${fullName}! አሁን ፎቶ ይምረጡ`, true);
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        currentPhotoData = null;
        document.getElementById('photoPreviewArea').innerHTML = '📸 ካሜራ ወይም ጋላሪ ይጫኑ';
    };

    // Camera & Gallery
    function handleFile(file) {
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            currentPhotoData = e.target.result;
            document.getElementById('photoPreviewArea').innerHTML = `<img src="${currentPhotoData}" alt="preview">`;
            showMessage("ፎቶ ተመርጧል! 'ፎቶ ተቀበል' ይጫኑ", true);
            console.log("Photo data stored, length:", currentPhotoData.length);
        };
        reader.readAsDataURL(file);
    }

    document.getElementById('cameraFrontBtn').onclick = () => {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.capture = 'user';
        input.onchange = (e) => handleFile(e.target.files[0]);
        input.click();
    };
    document.getElementById('galleryBtn').onclick = () => {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => handleFile(e.target.files[0]);
        input.click();
    };

    // ACCEPT PHOTO BUTTON - FIXED with explicit check and debug
    const acceptBtn = document.getElementById('acceptPhotoBtn');
    acceptBtn.onclick = function() {
        console.log("Accept button clicked. currentPhotoData =", currentPhotoData ? "exists" : "null");
        if(!currentPhotoData) {
            showMessage("እባክዎ መጀመሪያ ፎቶ ይምረጡ (ካሜራ ወይም ጋላሪ)", false);
            return;
        }
        // Save all data
        tempRegData.photoData = currentPhotoData;
        saveUser(tempRegData);
        showMessage("ምዝገባ ተሟልቷል! ወደ ማጠናቀቂያ ገጽ እየወሰድንዎት ነው...", true);
        
        // Show third page (black background with photo)
        const mainCard = document.getElementById('mainCard');
        mainCard.style.display = 'none';
        
        const thirdDiv = document.createElement('div');
        thirdDiv.className = 'third-page-full';
        thirdDiv.innerHTML = `
            <div class="photo-frame">
                <img src="${tempRegData.photoData}" alt="User Photo">
            </div>
            <div class="third-content">
                <h2>🎉 እንኳን ደስ ያለዎት!</h2>
                <p>ምዝገባዎ ተሳክቷል። ቴሌግራማችንን ይቀላቀሉ</p>
                <a href="https://t.me/+HIDAQtssqFI4MDFk" target="_blank" class="telegram-link">📢 ቴሌግራም ቻናል</a>
            </div>
        `;
        document.body.appendChild(thirdDiv);
    };

    // Login logic
    document.getElementById('doLoginBtn').onclick = () => {
        const phone = document.getElementById('loginPhone').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        const allUsers = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const found = allUsers.find(u => u.phone === phone && u.password === pwd && u.photoData);
        if(found) {
            tempRegData = found;
            showMessage("ገብተዋል! እንኳን ደህና መጡ", true);
            const mainCard = document.getElementById('mainCard');
            mainCard.style.display = 'none';
            const thirdDiv = document.createElement('div');
            thirdDiv.className = 'third-page-full';
            thirdDiv.innerHTML = `
                <div class="photo-frame"><img src="${found.photoData}" alt="Photo"></div>
                <div class="third-content"><h2>👋 እንኳን ደህና መጡ ወደ ኋላ!</h2>
                <a href="https://t.me/+HIDAQtssqFI4MDFk" target="_blank" class="telegram-link">📢 ቴሌግራም ቻናል</a></div>
            `;
            document.body.appendChild(thirdDiv);
        } else {
            showMessage("ስልክ ወይም ፓስወርድ ተሳስቷል ወይም ምዝገባ አልተጠናቀቀም", false);
        }
    };

    // Initial load: clear any demo data
    let existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    const cleaned = existing.filter(u => !(u.phone === '0947655291' && u.password === '123456'));
    if(cleaned.length !== existing.length) localStorage.setItem(STORAGE_KEY, JSON.stringify(cleaned));
    setMode('register');
</script>
</body>
</html>
